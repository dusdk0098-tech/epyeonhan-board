name: Release Windows

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version, e.g. 1.0.1'
        required: true
        type: string
      notes:
        description: 'Release notes'
        required: false
        default: ''
        type: string
      mandatory:
        description: 'Mark update mandatory'
        required: false
        default: false
        type: boolean
      prerelease:
        description: 'Mark GitHub Release as prerelease'
        required: false
        default: false
        type: boolean
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  release:
    runs-on: windows-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Resolve release metadata
        id: meta
        shell: pwsh
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_NOTES: ${{ inputs.notes }}
          INPUT_MANDATORY: ${{ inputs.mandatory }}
          INPUT_PRERELEASE: ${{ inputs.prerelease }}
        run: |
          if ($env:EVENT_NAME -eq 'workflow_dispatch') {
            $version = $env:INPUT_VERSION.Trim().TrimStart('v')
            $notes = $env:INPUT_NOTES
            $mandatory = ($env:INPUT_MANDATORY -eq 'true').ToString().ToLowerInvariant()
            $prerelease = ($env:INPUT_PRERELEASE -eq 'true').ToString().ToLowerInvariant()
          } else {
            $version = $env:GITHUB_REF_NAME.Trim().TrimStart('v')
            $notes = "Automatic tag release: $env:GITHUB_REF_NAME"
            $mandatory = 'false'
            $prerelease = 'false'
          }

          if ($version -notmatch '^\d+\.\d+\.\d+(-[0-9A-Za-z.-]+)?$') {
            throw "Invalid version: $version"
          }

          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=v$version" >> $env:GITHUB_OUTPUT
          "mandatory=$mandatory" >> $env:GITHUB_OUTPUT
          "prerelease=$prerelease" >> $env:GITHUB_OUTPUT
          "notes<<EOF" >> $env:GITHUB_OUTPUT
          $notes >> $env:GITHUB_OUTPUT
          "EOF" >> $env:GITHUB_OUTPUT

      - name: Install dependencies
        run: npm ci

      - name: Verify build environment
        shell: pwsh
        env:
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}
        run: |
          if (-not $env:VITE_SUPABASE_URL -or -not $env:VITE_SUPABASE_ANON_KEY) {
            throw 'Repository variables VITE_SUPABASE_URL and VITE_SUPABASE_ANON_KEY are required.'
          }

      - name: Set package version
        run: npm version ${{ steps.meta.outputs.version }} --no-git-tag-version --allow-same-version

      - name: Build installer
        env:
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}
        run: npm run package:win:installer

      - name: Inspect installer
        id: artifact
        shell: pwsh
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          $installer = Get-ChildItem -Path release -Filter '*setup.exe' -File |
            Where-Object { $_.Name -notlike '*-full-setup.exe' } |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1

          if (-not $installer) {
            throw 'NSIS installer was not found under release/.'
          }

          $uploadName = "PEDIT-$env:VERSION-setup.exe"
          $uploadPath = Join-Path $installer.DirectoryName $uploadName
          if ($installer.FullName -ne $uploadPath) {
            Copy-Item -LiteralPath $installer.FullName -Destination $uploadPath -Force
          }
          $uploadFile = Get-Item -LiteralPath $uploadPath
          $hash = (Get-FileHash -LiteralPath $uploadFile.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
          "path=$($uploadFile.FullName)" >> $env:GITHUB_OUTPUT
          "file_name=$($uploadFile.Name)" >> $env:GITHUB_OUTPUT
          "sha256=$hash" >> $env:GITHUB_OUTPUT
          "size_bytes=$($uploadFile.Length)" >> $env:GITHUB_OUTPUT

      - name: Create or update GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.meta.outputs.tag }}
          VERSION: ${{ steps.meta.outputs.version }}
          INSTALLER_PATH: ${{ steps.artifact.outputs.path }}
          PRERELEASE: ${{ steps.meta.outputs.prerelease }}
          RELEASE_NOTES: ${{ steps.meta.outputs.notes }}
        run: |
          $title = "PEDIT v$env:VERSION"
          gh release view $env:TAG *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $env:TAG $env:INSTALLER_PATH --clobber
          } else {
            $args = @('release', 'create', $env:TAG, $env:INSTALLER_PATH, '--title', $title, '--notes', $env:RELEASE_NOTES)
            if ($env:PRERELEASE -eq 'true') {
              $args += '--prerelease'
            }
            gh @args
          }

      - name: Generate GitHub Pages update manifest
        shell: pwsh
        env:
          TAG: ${{ steps.meta.outputs.tag }}
          VERSION: ${{ steps.meta.outputs.version }}
          FILE_NAME: ${{ steps.artifact.outputs.file_name }}
          SHA256: ${{ steps.artifact.outputs.sha256 }}
          SIZE_BYTES: ${{ steps.artifact.outputs.size_bytes }}
          MANDATORY: ${{ steps.meta.outputs.mandatory }}
          RELEASE_NOTES: ${{ steps.meta.outputs.notes }}
        run: |
          $siteRoot = Join-Path $pwd 'site'
          node scripts/build-pages-site.cjs
          $updateRoot = Join-Path $siteRoot 'updates/win'
          New-Item -ItemType Directory -Force -Path $updateRoot | Out-Null

          $encodedFileName = [System.Uri]::EscapeDataString($env:FILE_NAME)
          $downloadUrl = "https://github.com/$env:GITHUB_REPOSITORY/releases/download/$env:TAG/$encodedFileName"
          $manifest = [ordered]@{
            version = $env:VERSION
            pub_date = (Get-Date).ToUniversalTime().ToString('o')
            platform = 'windows'
            download_url = $downloadUrl
            file_name = $env:FILE_NAME
            sha256 = $env:SHA256
            size_bytes = [int64]$env:SIZE_BYTES
            mandatory = ($env:MANDATORY -eq 'true')
            min_supported_version = '1.0.0'
            notes = $env:RELEASE_NOTES
          }

          $latestPath = Join-Path $updateRoot 'latest.json'
          $versionPath = Join-Path $updateRoot "v$env:VERSION.json"
          $manifest | ConvertTo-Json -Depth 4 | Set-Content -LiteralPath $latestPath -Encoding UTF8
          Copy-Item -LiteralPath $latestPath -Destination $versionPath -Force


      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
